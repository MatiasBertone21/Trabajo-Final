version: '3.8'

services:
  backend:
    build: 
      context: ./backend
    ports:
      - "8000:8000"
    container_name: automation-lab-backend
    volumes:
      - ./backend:/app
    command: uvicorn main:app --host 0.0.0.0 --port 8000 --reload

  react:
    build: 
      context: ./frontend-react
    ports:
      - "3000:3000"
    container_name: automation-lab-react
    depends_on:
      - backend
    volumes:
      - ./frontend-react:/app
      - /app/node_modules

  angular:
    build: 
      context: ./frontend-angular
    ports:
      - "4200:4200"
    container_name: automation-lab-angular
    depends_on:
      - backend
    volumes:
      - ./frontend-angular:/app
      - /app/node_modules

  vue:
    build: 
      context: ./frontend-vue
    ports:
      - "5173:5173"
    container_name: automation-lab-vue
    depends_on:
      - backend
    volumes:
      - ./frontend-vue:/app
      - /app/node_modules